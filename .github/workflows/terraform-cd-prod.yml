name: Terraform Deployment for mlops Prod
'on':
  push:
    branches:
    - release
    paths:
    - mlops/terraform/**
  workflow_dispatch: null
defaults:
  run:
    working-directory: ./mlops/terraform
jobs:
  prod:
    concurrency: mlops-prod-terraform-job
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: https://e2-demo-field-eng.cloud.databricks.com
      DATABRICKS_TOKEN: ${{secrets.PROD_WORKSPACE_TOKEN}}
    steps:
    - uses: actions/checkout@v3
    - uses: hashicorp/setup-terraform@v1
    - name: Terraform fmt
      id: fmt
      run: terraform -chdir=prod fmt -check
      continue-on-error: true
    - name: Configure Terraform state backend authentication
      run: 'echo "AWS_ACCESS_KEY_ID=${{secrets.AWS_ACCESS_KEY_ID}}" >> "$GITHUB_ENV"

        echo "AWS_SECRET_ACCESS_KEY=${{secrets.AWS_SECRET_ACCESS_KEY}}" >> "$GITHUB_ENV"

        '
    - name: Terraform Init
      id: init
      run: terraform -chdir=prod init
    - name: Terraform Validate
      id: validate
      run: terraform -chdir=prod validate
    - name: Terraform Plan
      id: plan
      run: 'terraform -chdir=prod plan -no-color \

        -var="git_repo_url=${{ github.server_url }}/${{ github.repository }}"

        '
    - name: Terraform Apply
      id: apply
      run: 'terraform -chdir=prod apply -auto-approve \

        -var="git_repo_url=${{ github.server_url }}/${{ github.repository }}"

        '
    - name: Terraform Output
      id: output
      run: terraform -chdir=prod output -json
    - name: Commit Terraform Output to File
      id: commit
      run: "git pull\nmkdir -p output\necho '${{ steps.output.outputs.stdout }}' |\
        \ jq '.' > output/prod.json\ngit config --global user.name 'Terraform Output\
        \ Github Workflow'\ngit config --global user.email '<>'\noutput=$(git status\
        \ --porcelain)\nif [ -n \"$output\" ]\nthen\n  git add -A\n  git commit -m\
        \ \"Commit prod output\"\n  git push\n  git fetch origin release\n  git checkout\
        \ release\n  git cherry-pick main\n  git push\nfi\n"
